<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===================== PRIMARY SEO ===================== -->
    <title>Muhammad Hussain Memon | Portfolio – Web Developer & Designer</title>

    <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "Muhammad Hussain Memon",
      "url": "https://muhammadussainmemon.com/",
      "image": "https://muhammadussainmemon.com/myProfile.png",

      "description": "Professional web developer and designer specialising in modern frontend technologies.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Karachi",
        "addressCountry": "PK"
      },
      "sameAs": [
        "https://github.com/YOUR_GITHUB",
        "https://linkedin.com/in/YOUR_LINKEDIN",
        "https://twitter.com/YOUR_TWITTER"
      ]
    }
    </script>

    <!-- WebSite schema (enables Google Sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
